name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: jellyfin-rpc
            out: jellyfin-rpc-x86_64-linux
            test: true

          - name: linux-armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            bin: jellyfin-rpc
            out: jellyfin-rpc-arm32-linux
            test: false

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: jellyfin-rpc
            out: jellyfin-rpc-arm64-linux
            test: false

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: jellyfin-rpc.exe
            out: jellyfin-rpc-x86_64-windows.exe
            test: true

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            bin: jellyfin-rpc
            out: jellyfin-rpc-x86_64-darwin
            test: true

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: jellyfin-rpc
            out: jellyfin-rpc-arm64-darwin
            test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchains
        if: runner.os == 'Linux' && (matrix.target == 'armv7-unknown-linux-gnueabihf' || matrix.target == 'aarch64-unknown-linux-gnu')
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "armv7-unknown-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          else
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-
            ${{ runner.os }}-

      - name: Build
        run: cargo build --workspace --locked --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.test
        run: cargo test --all-features --locked

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/${{ matrix.bin }} target/${{ matrix.target }}/release/${{ matrix.out }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.out }}"

      - name: Move Windows artifact into target tree
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item "${{ matrix.out }}" "target/${{ matrix.target }}/release/${{ matrix.out }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: target/${{ matrix.target }}/release/${{ matrix.out }}
          if-no-files-found: error

  publish:
    name: Upload assets to release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        run: find dist -maxdepth 3 -type f -print

      - name: Attach binaries to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
